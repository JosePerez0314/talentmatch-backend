name: Continuous Integration & Deployment

on:
  push:
    branches:
      - main

jobs:
  # Job 1: Static Analysis Gatekeeper
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Verify TypeScript Compilation
        run: npm run type-check

  # Job 2: Secure Deployment
  deploy:
    runs-on: ubuntu-latest
    needs: validate # Crucial: Ensures deployment only happens if TypeScript compiles perfectly

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # 1. Move into the application directory
            cd /home/deployer/projects/talentmatch-backend

            # 2. Reset local changes safely and pull the latest production branch
            git fetch origin main
            git reset --hard origin/main

            # 3. Spin down existing containers and rebuild the images explicitly using production file
            docker compose -f docker-compose.yml down
            docker compose -f docker-compose.yml up -d --build

            # 4. Run Prisma database migrations inside the active Node container
            # Make sure 'backend-service-name' matches the service key inside your docker-compose.yml
            docker compose -f docker-compose.yml exec -T backend-service-name npx prisma migrate deploy

            # 5. Prevent server disk space starvation by purging old images
            docker system prune -af
